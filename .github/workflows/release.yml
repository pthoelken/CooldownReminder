name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Package and release CooldownReminder
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate CurseForge secrets
        shell: bash
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
        run: |
          if [ -z "${CURSEFORGE_API_TOKEN}" ]; then
            echo "CURSEFORGE_API_TOKEN repository secret is required."
            exit 1
          fi
          if [ -z "${CURSEFORGE_PROJECT_ID}" ]; then
            echo "CURSEFORGE_PROJECT_ID repository secret is required."
            exit 1
          fi

      - name: Read addon metadata
        id: meta
        shell: bash
        run: |
          version="$(awk -F': ' '/^## Version:/ { print $2; exit }' CooldownReminder.toc)"
          interface="$(awk -F': ' '/^## Interface:/ { print $2; exit }' CooldownReminder.toc)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "interface=${interface}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Build zip package
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist/CooldownReminder/Localization
          cp CooldownReminder.toc Core.lua Spells.lua Reminder.lua Options.lua Events.lua dist/CooldownReminder/
          cp Localization/*.lua dist/CooldownReminder/Localization/
          cd dist
          zip -r -X "CooldownReminder-${{ steps.meta.outputs.version }}.zip" CooldownReminder

      - name: Resolve CurseForge game version IDs
        id: curse_versions
        shell: bash
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
          WOW_INTERFACE: ${{ steps.meta.outputs.interface }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request

          token = os.environ["CURSEFORGE_API_TOKEN"]
          wow_interface = os.environ["WOW_INTERFACE"].strip()
          output_path = os.environ["GITHUB_OUTPUT"]

          def normalize(value):
              return re.sub(r"[^0-9a-z]+", "", str(value).lower())

          def interface_to_retail_version(value):
              digits = re.sub(r"\D", "", value)
              if len(digits) < 6:
                  return value
              major = int(digits[:-4])
              minor = int(digits[-4:-2])
              patch = int(digits[-2:])
              return f"{major}.{minor}.{patch}"

          retail_version = interface_to_retail_version(wow_interface)
          target_values = {
              wow_interface,
              retail_version,
              retail_version.replace(".", ""),
              normalize(wow_interface),
              normalize(retail_version),
          }

          endpoints = [
              (
                  "legacy wow.curseforge.com",
                  "https://wow.curseforge.com/api/game/versions",
                  {},
              ),
              (
                  "legacy curseforge.com",
                  "https://www.curseforge.com/api/game/versions",
                  {},
              ),
              (
                  "legacy forgesvc",
                  "https://addons-ecs.forgesvc.net/api/v2/game/versions",
                  {},
              ),
              (
                  "CurseForge Core API v1",
                  "https://api.curseforge.com/v1/games/1/versions",
                  {"x-api-key": token},
              ),
              (
                  "CurseForge Core API v1 retail type",
                  "https://api.curseforge.com/v1/games/1/version-types/517/versions",
                  {"x-api-key": token},
              ),
              (
                  "CurseForge Core API v2",
                  "https://api.curseforge.com/v2/games/1/versions",
                  {"x-api-key": token},
              ),
          ]

          def get_numeric_id(item):
              for key in ("id", "gameVersionId", "gameVersionID"):
                  value = item.get(key)
                  if isinstance(value, int):
                      return value
                  if isinstance(value, str) and value.isdigit():
                      return int(value)

          def has_retail_marker(item):
              text = " ".join(str(item.get(key, "")) for key in (
                  "type", "name", "slug", "versionType", "gameVersionTypeName", "gameVersionTypeSlug"
              )).lower()
              if "wow_retail" in text or "retail" in text:
                  return True
              for key in ("id", "typeId", "typeID", "gameVersionTypeId", "gameVersionTypeID"):
                  if str(item.get(key, "")) == "517":
                      return True
              return False

          def is_target_version(item):
              fields = (
                  "name", "slug", "version", "gameVersion", "displayName", "versionString"
              )
              for key in fields:
                  value = item.get(key)
                  if value is None:
                      continue
                  text = str(value)
                  if text in target_values or normalize(text) in target_values:
                      return True
              return False

          def collect_matches(payload):
              retail_matches = []
              any_matches = []
              seen = set()

              def walk(value, in_retail_context=False):
                  if isinstance(value, dict):
                      retail_context = in_retail_context or has_retail_marker(value)
                      numeric_id = get_numeric_id(value)
                      if numeric_id and numeric_id not in (1, 517) and is_target_version(value):
                          if numeric_id not in seen:
                              seen.add(numeric_id)
                              any_matches.append(numeric_id)
                              if retail_context:
                                  retail_matches.append(numeric_id)
                      for child in value.values():
                          walk(child, retail_context)
                  elif isinstance(value, list):
                      for child in value:
                          walk(child, in_retail_context)

              walk(payload)
              return retail_matches or any_matches

          failures = []
          game_version_ids = []

          for label, url, extra_headers in endpoints:
              headers = {
                  "Accept": "application/json",
                  "User-Agent": "CooldownReminder release workflow",
              }
              headers.update(extra_headers)
              request = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      payload = json.load(response)
              except urllib.error.HTTPError as exc:
                  failures.append(f"{label}: HTTP {exc.code} {exc.reason}")
                  print(f"Skipping {label}: HTTP {exc.code} {exc.reason}")
                  continue
              except Exception as exc:
                  failures.append(f"{label}: {exc}")
                  print(f"Skipping {label}: {exc}")
                  continue

              game_version_ids = collect_matches(payload)
              if game_version_ids:
                  print(f"Resolved CurseForge game version IDs via {label}.")
                  break

              failures.append(f"{label}: no matching Retail version for {retail_version}")
              print(f"Skipping {label}: no matching Retail version for {retail_version}")

          if not game_version_ids:
              details = "\n".join(f"- {failure}" for failure in failures)
              raise SystemExit(
                  f"No CurseForge game version ID found for WoW interface {wow_interface} "
                  f"(Retail version {retail_version}).\n"
                  f"Tried these sources:\n{details}\n"
                  "If CurseForge has not listed this WoW version yet, wait until it appears there. "
                  "If every authenticated Core API request returns 403, the configured token is accepted "
                  "for uploads but not for CurseForge Core API lookup; the workflow already tries the "
                  "public legacy lookup sources first."
              )

          ids = ",".join(str(value) for value in game_version_ids)
          print(f"Resolved CurseForge game version IDs for {retail_version}: {ids}")
          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"ids={ids}\n")
          PY

      - name: Upload to CurseForge
        shell: bash
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          CURSEFORGE_GAME_VERSION_IDS: ${{ steps.curse_versions.outputs.ids }}
          ADDON_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          game_versions = [
              int(value.strip())
              for value in os.environ["CURSEFORGE_GAME_VERSION_IDS"].split(",")
              if value.strip()
          ]
          if not game_versions:
              raise SystemExit("No CurseForge game version IDs were resolved.")

          metadata = {
              "changelog": Path("DESCRIPTION.md").read_text(encoding="utf-8"),
              "changelogType": "markdown",
              "displayName": f"CooldownReminder {os.environ['ADDON_VERSION']}",
              "gameVersions": game_versions,
              "releaseType": "release",
          }
          Path("dist/metadata.json").write_text(json.dumps(metadata), encoding="utf-8")
          PY
          curl --fail-with-body -sS \
            -H "x-api-token: ${CURSEFORGE_API_TOKEN}" \
            -F "metadata=<dist/metadata.json" \
            -F "file=@dist/CooldownReminder-${ADDON_VERSION}.zip" \
            "https://wow.curseforge.com/api/projects/${CURSEFORGE_PROJECT_ID}/upload-file"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: CooldownReminder ${{ steps.meta.outputs.version }}
          body_path: DESCRIPTION.md
          files: dist/CooldownReminder-${{ steps.meta.outputs.version }}.zip
          make_latest: true
