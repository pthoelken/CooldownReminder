name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Package and release CooldownReminder
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate CurseForge secrets
        shell: bash
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
        run: |
          if [ -z "${CURSEFORGE_API_TOKEN}" ]; then
            echo "CURSEFORGE_API_TOKEN repository secret is required."
            exit 1
          fi
          if [ -z "${CURSEFORGE_PROJECT_ID}" ]; then
            echo "CURSEFORGE_PROJECT_ID repository secret is required."
            exit 1
          fi

      - name: Read addon metadata
        id: meta
        shell: bash
        run: |
          version="$(awk -F': ' '/^## Version:/ { print $2; exit }' CooldownReminder.toc)"
          interface="$(awk -F': ' '/^## Interface:/ { print $2; exit }' CooldownReminder.toc)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "interface=${interface}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Build zip package
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist/CooldownReminder/Localization
          cp CooldownReminder.toc Core.lua Spells.lua Reminder.lua Options.lua Events.lua dist/CooldownReminder/
          cp Localization/*.lua dist/CooldownReminder/Localization/
          cd dist
          zip -r -X "CooldownReminder-${{ steps.meta.outputs.version }}.zip" CooldownReminder

      - name: Resolve CurseForge game version IDs
        id: curse_versions
        shell: bash
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
          WOW_INTERFACE: ${{ steps.meta.outputs.interface }}
        run: |
          token="$(printf '%s' "${CURSEFORGE_API_TOKEN}" | tr -d '\r\n')"
          if [[ "${token}" == *"token="* ]]; then
            token="${token#*token=}"
            token="${token%%&*}"
          fi
          if [ -z "${token}" ]; then
            echo "CURSEFORGE_API_TOKEN repository secret is empty."
            exit 1
          fi
          echo "::add-mask::${token}"
          echo "Fetching CurseForge game versions from wow.curseforge.com with CURSEFORGE_API_TOKEN (${#token} characters)."

          curl --fail-with-body -sS \
            "https://wow.curseforge.com/api/game/versions?token=${token}" \
            -o dist/curseforge-game-versions.json

          python3 <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          wow_interface = os.environ["WOW_INTERFACE"].strip()
          output_path = os.environ["GITHUB_OUTPUT"]
          payload = json.loads(Path("dist/curseforge-game-versions.json").read_text(encoding="utf-8"))

          def normalize(value):
              return re.sub(r"[^0-9a-z]+", "", str(value).lower())

          def interface_to_retail_version(value):
              digits = re.sub(r"\D", "", value)
              if len(digits) < 6:
                  return value
              major = int(digits[:-4])
              minor = int(digits[-4:-2])
              patch = int(digits[-2:])
              return f"{major}.{minor}.{patch}"

          retail_version = interface_to_retail_version(wow_interface)
          target_values = {
              wow_interface,
              retail_version,
              retail_version.replace(".", ""),
              normalize(wow_interface),
              normalize(retail_version),
          }

          def get_numeric_id(item):
              for key in ("id", "gameVersionId", "gameVersionID"):
                  value = item.get(key)
                  if isinstance(value, int):
                      return value
                  if isinstance(value, str) and value.isdigit():
                      return int(value)

          def has_retail_marker(item):
              text = " ".join(str(item.get(key, "")) for key in (
                  "type",
                  "name",
                  "slug",
                  "versionType",
                  "gameVersionTypeName",
                  "gameVersionTypeSlug",
                  "gameVersionType",
              )).lower()
              if "wow_retail" in text or "retail" in text:
                  return True
              for key in ("typeId", "typeID", "gameVersionTypeId", "gameVersionTypeID"):
                  if str(item.get(key, "")) == "517":
                      return True
              return False

          def is_target_version(item):
              fields = (
                  "name",
                  "slug",
                  "version",
                  "versionName",
                  "gameVersion",
                  "gameVersionName",
                  "displayName",
                  "versionString",
              )
              for key in fields:
                  value = item.get(key)
                  if value is None:
                      continue
                  text = str(value)
                  if text in target_values or normalize(text) in target_values:
                      return True
              return False

          retail_matches = []
          any_matches = []
          seen = set()

          def walk(value, in_retail_context=False):
              if isinstance(value, dict):
                  retail_context = in_retail_context or has_retail_marker(value)
                  numeric_id = get_numeric_id(value)
                  if numeric_id and numeric_id != 517 and is_target_version(value):
                      if numeric_id not in seen:
                          seen.add(numeric_id)
                          any_matches.append(numeric_id)
                          if retail_context:
                              retail_matches.append(numeric_id)
                  for child in value.values():
                      walk(child, retail_context)
              elif isinstance(value, list):
                  for child in value:
                      walk(child, in_retail_context)

          walk(payload)
          game_version_ids = retail_matches or any_matches

          if not game_version_ids:
              raise SystemExit(
                  f"No CurseForge game version ID found for WoW interface {wow_interface} "
                  f"(Retail version {retail_version}).\n"
                  "The workflow fetched https://wow.curseforge.com/api/game/versions?token=*** successfully, "
                  "but that response did not contain a matching Retail game version."
              )

          ids = ",".join(str(value) for value in game_version_ids)
          print(f"Resolved CurseForge Retail game version IDs for {retail_version}: {ids}")
          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"ids={ids}\n")
          PY

      - name: Read changelog
        id: changelog
        shell: bash
        run: |
          delimiter="CURSEFORGE_CHANGELOG_$(date +%s%N)"
          {
            echo "body<<${delimiter}"
            cat DESCRIPTION.md
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to CurseForge
        uses: itsmeow/curseforge-upload@v3.1.2
        with:
          token: ${{ secrets.CURSEFORGE_API_TOKEN }}
          project_id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          game_endpoint: wow
          file_path: dist/CooldownReminder-${{ steps.meta.outputs.version }}.zip
          game_versions: ${{ steps.curse_versions.outputs.ids }}
          release_type: release
          display_name: CooldownReminder ${{ steps.meta.outputs.version }}
          changelog: ${{ steps.changelog.outputs.body }}
          changelog_type: markdown

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: CooldownReminder ${{ steps.meta.outputs.version }}
          body_path: DESCRIPTION.md
          files: dist/CooldownReminder-${{ steps.meta.outputs.version }}.zip
          make_latest: true
